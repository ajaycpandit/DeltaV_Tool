pending confirms = 0", "expr": "'SET_PATH1/PENDING_CONFIRMS.CV' = 0", "term": false}, "PATH1_CMPLT": {"desc": "BLOW_PATH1 pending confirms = 0 AND Timer 1 complete", "expr": "'BLOW_PATH1/PENDING_CONFIRMS.CV' = 0 AND\r\n'//#UNIT_TIMER#/TIMER1/TIMER_COMPLETE.CV' = True", "term": false}, "PATH2_CMPLT": {"desc": "BLOW_PATH2 pending cofirms = 0 AND Timer 2 complete", "expr": "'BLOW_PATH2/PENDING_CONFIRMS.CV' = 0 AND\r\n'//#UNIT_TIMER#/TIMER2/TIMER_COMPLETE.CV' = True", "term": false}, "PATH2_SET": {"desc": "SET_PATH2 pending confirms = 0", "expr": "'SET_PATH2/PENDING_CONFIRMS.CV' = 0", "term": false}, "PRS_RLF_CMPLT": {"desc": "WAIT_RELIEF pending confirms AND U_PRS_RLF_TM has elapsed", "expr": "'WAIT_RELIEF/PENDING_CONFIRMS.CV' = 0 AND\r\n'WAIT_RELIEF/TIME.CV' >= '//#UNIT_MOD#/U_PRESS_RLF_TM.CV'", "term": false}, "RUNNING": {"desc": "RUN_LOGIC pending confirms = 0 AND Task Pointer = 0", "expr": "'RUN_LOGIC/PENDING_CONFIRMS.CV' = 0 AND '^/P_TASK_POINTER.CV' = 0", "term": false}, "SKID_CMPLT": {"desc": "WAIT_CMPLT pending confirms and CIP skid sends CIP Cycle Complete message (D_CIP_SKID_MSG)", "expr": "'WAIT_CMPLT/PENDING_CONFIRMS.CV' = 0 AND\r\n(('^/D_CIP_SKID_UNIT.CV' = '//#UNIT_MOD#/U_UNIT_NAME.CV'AND\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:CIP Cycle Complete') OR\r\n'^/D_CIP_SKID_UNIT.CV' != 'b_b5_units:NONE')", "term": false}, "SKID_DONE": {"desc": "WAIT_NONE pending confirms = 0 AND CIP skid sets message to None", "expr": "'WAIT_NONE/PENDING_CONFIRMS.CV' = 0 AND\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:None'", "term": false}, "SKID_MSG": {"desc": "WAIT_SKID_BLW pending confirms = 0 and D_CIP_SKID_MSG = N2 Blow Complete", "expr": "'WAIT_SKID_BLW/PENDING_CONFIRMS.CV' = 0 AND\r\n'^/D_CIP_SKID_UNIT.CV' = '//#UNIT_MOD#/U_UNIT_NAME.CV' AND\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:N2 Blow Complete'", "term": false}, "SKID_MSG1": {"desc": "SEND_END_MSG pending confirms = 0", "expr": "'SEND_END_MSG/PENDING_CONFIRMS.CV' = 0", "term": false}, "SKID_READY": {"desc": "WAIT_READY pending confirms = 0 and D_CIP_SKID_MSG = Ready for N2 Blow", "expr": "'WAIT_READY/PENDING_CONFIRMS.CV' = 0 AND\r\n'^/D_CIP_SKID_UNIT.CV' = '//#UNIT_MOD#/U_UNIT_NAME.CV' AND\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:Ready for N2 Blow'", "term": false}, "SYNC_READY": {"desc": "Resync initialization complete and skid returnst Ready for N2 Blow or Next Rinse or Cycle Complete", "expr": "'RESTRT_SYNC/PENDING_CONFIRMS.CV' = 0 AND\r\n(\r\n('^/R_FINAL_BLOW.CV' = 'b_yes_no:NO' AND\r\n'^/D_CIP_SKID_UNIT.CV' = '//#UNIT_MOD#/U_UNIT_NAME.CV' AND\r\n('^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:Ready for N2 Blow' OR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:N2 Blow Complete' OR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:Ready for RO Rinse' OR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:Ready for WFI Rinse')\r\n) \r\nOR\r\n('^/R_FINAL_BLOW.CV' = 'b_yes_no:YES' AND\r\n(\r\n('^/D_CIP_SKID_UNIT.CV' = '//#UNIT_MOD#/U_UNIT_NAME.CV' AND\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:Ready for N2 Blow')\r\nOR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:N2 Blow Complete' OR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:CIP Cycle Complete' OR\r\n'^/D_CIP_SKID_MSG.CV' = 'b_cip_msgs:None')\r\n)\r\n)", "term": false}, "SYNC_SET": {"desc": "SET_SYNC pending confirms = 0", "expr": "'SET_SYNC/PENDING_CONFIRMS.CV' = 0", "term": false}, "SYNC_SET2": {"desc": "SET_SYNC2 pending confirms = 0", "expr": "'SET_SYNC2/PENDING_CONFIRMS.CV' = 0", "term": false}, "TP1": {"desc": "RUN_LOGIC pending confirms = 0 AND Task Pointer = 1", "expr": "'RUN_LOGIC/PENDING_CONFIRMS.CV' = 0 AND \r\n'^/P_TASK_POINTER.CV' = 1", "term": false}, "TP2": {"desc": "RUN_LOGIC pending confirms = 0 and Task Pointer = 2", "expr": "'RUN_LOGIC/PENDING_CONFIRMS.CV' = 0 AND '^/P_TASK_POINTER.CV' = 2", "term": false}, "TP3": {"desc": "RUN_LOGIC pending confirms = 0 and Task Pointer = 3", "expr": "'RUN_LOGIC/PENDING_CONFIRMS.CV' = 0 AND '^/P_TASK_POINTER.CV' = 3", "term": false}, "TP4": {"desc": "RUN_LOGIC pending confirms = 0 and Task Pointer = 4", "expr": "'RUN_LOGIC/PENDING_CONFIRMS.CV' = 0 AND '^/P_TASK_POINTER.CV' = 4", "term": false}, "VLVS_OPEN": {"desc": "OPEN_VLVS pending confirms = 0 AND Time > 10 seconds (allow valves to travel)", "expr": "'OPEN_VLVS/PENDING_CONFIRMS.CV' = 0 AND\r\n'OPEN_VLVS/TIME.CV' > 10", "term": false}}}};
let curBlock = Object.keys(DATA)[0];
let zoom = 1;

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function showBlock(key){
  curBlock = key;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.k===key));
  document.querySelectorAll('.block').forEach(b=>b.classList.toggle('hidden',b.dataset.k!==key));
  clearPanel();
  buildTable();
  zoom=1; applyZoom();
}

function clearPanel(){
  document.getElementById('panel').innerHTML='<h3>Step actions</h3><div class="empty">Click a step in the diagram to see its full actions here.</div>';
  document.querySelectorAll('.step.sel').forEach(s=>s.classList.remove('sel'));
}

function selectStep(sn){
  const blk = DATA[curBlock];
  const sd = blk.steps[sn]; if(!sd) return;
  document.querySelectorAll('.block:not(.hidden) .step.sel').forEach(s=>s.classList.remove('sel'));
  const g = document.querySelector('.block:not(.hidden) .step[data-step="'+CSS.escape(sn)+'"]');
  if(g) g.classList.add('sel');
  let h = '<h3>'+esc(sn)+(sd.desc?' — '+esc(sd.desc):'')+'</h3>';
  if(!sd.actions.length){ h+='<div class="empty">No actions.</div>'; }
  sd.actions.forEach(a=>{
    h+='<div class="act"><div class="h">'+esc(a.id)+(a.qual?'<span class="q">'+esc(a.qual)+'</span>':'')+'</div>';
    if(a.desc) h+='<div>'+esc(a.desc)+'</div>';
    if(a.expr) h+='<div class="expr">'+esc(a.expr)+'</div>';
    let meta=[]; if(a.delay && a.delay!=='0') meta.push('delay: '+esc(a.delay));
    if(a.confirm) meta.push('confirm: '+esc(a.confirm));
    if(meta.length) h+='<div class="meta">'+meta.join('  ·  ')+'</div>';
    h+='</div>';
  });
  document.getElementById('panel').innerHTML=h;
}

// tooltips
const tip=document.getElementById('tip');
function tipShow(html,x,y){tip.innerHTML=html;tip.style.display='block';tip.style.left=(x+14)+'px';tip.style.top=(y+14)+'px';}
function tipHide(){tip.style.display='none';}

function wireBlock(blockEl){
  blockEl.querySelectorAll('.step').forEach(g=>{
    const sn=g.dataset.step;
    g.addEventListener('click',()=>selectStep(sn));
    g.addEventListener('keypress',e=>{if(e.key==='Enter')selectStep(sn);});
    g.addEventListener('mousemove',e=>{
      const sd=DATA[curBlock].steps[sn]; if(!sd)return;
      let h='<div class="tt">'+esc(sn)+(sd.desc?' — '+esc(sd.desc):'')+'</div>';
      h+='<div class="ln">'+(sd.actions.length?sd.actions.map(a=>'• '+esc(a.id)+' ['+esc(a.qual)+'] '+esc(a.desc)).join('\n'):'(no actions)')+'</div>';
      tipShow(h,e.clientX,e.clientY);
    });
    g.addEventListener('mouseleave',tipHide);
  });
  blockEl.querySelectorAll('.trans').forEach(g=>{
    const tn=g.dataset.trans;
    g.addEventListener('mousemove',e=>{
      const td=DATA[curBlock].trans[tn]; if(!td)return;
      let h='<div class="tt">'+esc(tn)+(td.term?' (terminating)':'')+(td.desc?' — '+esc(td.desc):'')+'</div>';
      if(td.expr) h+='<div class="ln">'+esc(td.expr)+'</div>';
      tipShow(h,e.clientX,e.clientY);
    });
    g.addEventListener('mouseleave',tipHide);
  });
}

function buildTable(){
  const blk=DATA[curBlock];
  let rows='';
  Object.keys(blk.steps).forEach(sn=>{
    const sd=blk.steps[sn];
    rows+='<tr class="step-row"><td colspan="6">'+esc(sn)+(sd.desc?' — '+esc(sd.desc):'')+' ('+sd.actions.length+' actions)</td></tr>';
    sd.actions.forEach(a=>{
      rows+='<tr class="arow"><td>'+esc(sn)+'</td><td>'+esc(a.id)+'</td><td>'+esc(a.desc)+'</td><td>'+esc(a.qual)+'</td><td class="expr">'+esc(a.expr)+'</td><td>'+[a.delay&&a.delay!=='0'?'delay '+esc(a.delay):'',a.confirm?'confirm '+esc(a.confirm):''].filter(Boolean).join(' / ')+'</td></tr>';
    });
  });
  document.getElementById('tbody').innerHTML=rows;
  document.getElementById('search').value='';
}

function filterTable(){
  const q=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('#tbody tr.arow').forEach(tr=>{
    tr.classList.toggle('hidden', q && !tr.textContent.toLowerCase().includes(q));
  });
  // hide step header rows whose actions are all hidden
  document.querySelectorAll('#tbody tr.step-row').forEach(h=>{
    let n=h.nextElementSibling, any=false;
    while(n && n.classList.contains('arow')){ if(!n.classList.contains('hidden')) any=true; n=n.nextElementSibling; }
    h.classList.toggle('hidden', q && !any);
  });
}

function applyZoom(){document.querySelectorAll('.block:not(.hidden) svg.sfc').forEach(s=>s.style.transform='scale('+zoom+')');}
function zoomIn(){zoom=Math.min(4,zoom*1.2);applyZoom();}
function zoomOut(){zoom=Math.max(.3,zoom/1.2);applyZoom();}
function zoomReset(){zoom=1;applyZoom();}

window.addEventListener('DOMContentLoaded',()=>{
  document.querySelectorAll('.block').forEach(wireBlock);
  showBlock(curBlock);
});
</script>
</body></html>
